esphome:
  name: fairy_lights_32
  platform: ESP32
  board: esp32doit-devkit-v1

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# 10.0.0.242

# Enable logging
logger:
  level: INFO

ota:

api:

output:
  - platform: ledc
    pin: 2
    frequency: 5000
    id: pin_2

light:
  - platform: monochromatic
    name: "Fairy Lights"
    output: pin_2
    effects:
      - strobe:
      - strobe:
          name: Fast Strobe
          colors:
            - state: True
              brightness: 100%
              duration: 250ms
            - state: True
              brightness: 0%
              duration: 250ms

binary_sensor:
  - platform: gpio
    id: bedside_button_1
    internal: true
    pin:
      number: 5
      mode: INPUT_PULLUP
      inverted: True
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at most 1s
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - logger.log: "Double Clicked"
          - homeassistant.service:
              service: script.send_event_bedside_button_1_double
      - timing:
          - ON for 1s to 2s
          - OFF for at least 0.5s
        then:
          - logger.log: "Single Long Clicked"
          - homeassistant.service:
              service: script.send_event_bedside_button_1_hold
      - timing:
          - ON for at most 1s
          - OFF for at least 0.5s
        then:
          - logger.log: "Single Short Clicked"
          - homeassistant.service:
              service: script.send_event_bedside_button_1_single
